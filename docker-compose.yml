version: '3.8'

services:
  threat-intel:
    build: .
    container_name: threat-intelligence-aggregator
    ports:
      - "5000:5000"
    environment: 
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///threat_intelligence.db
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - threat-intel-network

networks:
  threat-intel-network:
    driver: bridge 
